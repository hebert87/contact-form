<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Form</title>

    <!-- Favicon -->
    <link rel="icon" href="/img/download.jpeg">

    <!-- External CSS -->
    <link rel="stylesheet" href="/styles/style.css">
</head>

<body>

    <main class="container">
        <h1>Contact Form</h1>

        <form id="contact-form" action="/submit-contact" method="post">
            <div class="grid">

                <div>
                <label for="first-name">First Name
                    <span class="err" id="errFname" style="display:none;">
                        First name is required
                    </span>
                </label>
                <input id="first-name" name="first-name" type="text">
                </div>

                <div>
                <label for="last-name">Last Name
                    <span class="err" id="errLname" style="display:none;">
                        Last name is required
                    </span>
                </label>
                <input id="last-name" name="last-name" type="text">
                </div>

                <div>
                <label for="job-title">Job Title</label>
                <input id="job-title" name="job-title" type="text">
                </div>

                <div>
                <label for="company">Company</label>
                <input id="company" name="company" type="text">
                </div>

                <div>
                <label for="linkedin">LinkedIn URL
                    <span class="err" id="errLinkedin" style="display:none;">
                        LinkedIn URL must start with https://linkedin.com/in/
                    </span>
                </label>
                <input id="linkedin" name="linkedin" type="url">
                </div>

                <div>
                <label for="email">Email Address
                    <span class="err" id="errEmail" style="display:none;">
                        Please enter a valid email address.
                    </span>
                </label>
                <input id="email" name="email" type="email">
                </div>

                <div>
                <label for="meeting">How did we meet?
                    <span class="err" id="errMeeting" style="display:none;">
                        Please select how we met
                    </span>
                </label>
                <select id="meeting" name="meeting">
                    <option>Please select</option>
                    <option>School</option>
                    <option>Work</option>
                    <option>Conference</option>
                    <option>Online</option>
                </select>
                </div>

                <div>
                <label for="other">Other (please specify)</label>
                <input id="other" name="other" type="text">
                </div>

                <div class="full">
                <label for="message">Message</label>
                <textarea id="message" name="message"></textarea>
                </div>

            </div>

            <div class="options">
                <label>
                <input type="checkbox" name="mailing-list">
                Please add me to your mailing list
                </label>

                <div>
                Choose an email format:
                <label><input type="radio" name="format" checked> HTML</label>
                <label><input type="radio" name="format"> Text</label>
                </div>
            </div>

        <button type="submit">Submit</button>
        </form>
        
    </main>
    <footer>
        <p>Project Repository:
            <a href="https://github.com/hebert87/contact-form" target="_blank">
                GitHub
            </a>
        </p>
    </footer>
<script src="/js/contact.js"></script>
</body>
</html>
